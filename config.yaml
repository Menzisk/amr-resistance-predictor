biology:
  enzyme: ANT(3'')-Ia
  model_antibiotics:
  - amikacin
  - gentamicin
  - tobramycin
  organism: Acinetobacter baumannii
  organism_short: A. baumannii
data:
  limit_per_class: 25000
  phenotype_classes:
  - Resistant
  - Susceptible
  processed_dir: data/processed/
  raw_dir: data/raw/
  taxon_id: 470
model:
  colsample_bytree: 0.8
  eval_metric: logloss
  learning_rate: 0.1
  max_depth: 4
  n_estimators: 200
  n_folds: 5
  random_state: 42
  subsample: 0.8
  test_size: 0.2
outputs:
  dpi: 300
  figure_dir: outputs/figures/
  model_dir: outputs/models/
